<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 10 - Exercício Lanchonete</title>
    <link rel="icon" type="image/png" href="../favicon/JS.png" />
    <link rel="stylesheet" href="styles/style.css" />
    <script defer src="scripts/script.js"></script>
  </head>
  <body>
    <h2>🍔 Lanchonete</h2>
    <div>
      <input type="text" id="inputPedido" placeholder="Digite o pedido" />
      <button id="btnAdicionar">Adicionar Pedido</button>
    </div>
    <ul id="listaPedidos"></ul>
    <div class="botoes">
      <button id="btnAtender">Atender Próximo</button>
      <button id="btnLimpar">Limpar Pedidos</button>
    </div>
    <p id="pedidoAtual"></p>
    <p>Total de pedidos: <total id="total">0</total></p>
    <ul id="pedidosAtendidos"></ul>
  </body>
</html>
