<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 13 - Manipulação + Filtros</title>
    <link rel="icon" type="image/png" href="../favicon/JS.png" />
    <link rel="stylesheet" href="styles/style.css" />
    <script defer src="scripts/script.js"></script>
  </head>
  <body>
    <main>
      <h1>Catálogo de Produtos</h1>

      <div class="filtros">
        <input
          type="text"
          id="campoBusca"
          placeholder="Digite para buscar um produto"
        />
        <select id="ordenacao">
          <option value="nome-az">Nome (A-Z)</option>
          <option value="nome-za">Nome (Z-A)</option>
          <option value="preco-menor">Menor preço</option>
          <option value="preco-maior">Maior preço</option>
        </select>
      </div>

      <ul>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Áudio" />
            <span>Áudio</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Acessórios" />
            <span>Acessórios</span>
          </label>
        </li>
        <li>
          <label>
            <input
              type="checkbox"
              class="check-categoria"
              value="Computadores"
            />
            <span>Computadores</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Hardware" />
            <span>Hardware</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Monitores" />
            <span>Monitores</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Móveis" />
            <span>Móveis</span>
          </label>
        </li>
        <li>
          <label>
            <input
              type="checkbox"
              class="check-categoria"
              value="Periféricos"
            />
            <span>Periféricos</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="check-categoria" value="Redes" />
            <span>Redes</span>
          </label>
        </li>
      </ul>

      <div id="listaProdutos" class="lista-produtos"></div>
    </main>
  </body>
</html>
