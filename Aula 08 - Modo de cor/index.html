<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 08 - Modo de cor</title>
    <link rel="icon" type="image/png" href="../favicon/JS.png" />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div id="caixa" class="div">
      <h1 id="titulo">Troca de modo</h1>
      <p id="texto">
        Clique no botão para mudar entre modo claro e modo escuro
      </p>
      <button id="botaoTema" class="button hue-rotate">
        Ativar Modo Escuro
      </button>
    </div>

    <div id="caixaAtv1" class="div">
      <h1 id="tituloAtv1">Atividade</h1>
      <div class="like">
        <button id="botaoAtv1" class="button hue-rotate">Não curtido</button>
        <svg id="heartSVG" width="100" height="100" viewBox="0 0 24 24">
          <path
            id="heartPath"
            fill="none"
            stroke="red"
            stroke-width="1"
            d="M12 21s-6-4.35-9.33-8.22C-.5 7.39 3.24 1 8.4 4.28 10.08 5.32 12 7.5 12 7.5s1.92-2.18 3.6-3.22C20.76 1 24.5 7.39 21.33 12.78 18 16.65 12 21 12 21z"
          ></path>
        </svg>
      </div>
    </div>

    <div id="caixaAtv2" class="div">
      <h1 id="tituloAtv2">Login</h1>
      <form id="formLogin">
        <div class="form">
          <label for="" id="label1">Usuário:</label>
          <input
            type="text"
            class="hue-rotate"
            id="inputUser"
            placeholder="Usuário"
          />
        </div>
        <div class="form">
          <label for="" id="label2">Senha:</label>
          <input
            type="password"
            class="hue-rotate"
            id="inputPass"
            placeholder="Senha"
          />
        </div>
        <button type="submit" class="button hue-rotate" id="botaoAtv2">
          Enviar
        </button>
      </form>
      <p id="formText"></p>
    </div>

    <div id="caixaAtv3" class="div">
      <h1 id="tituloAtv3">Lista de tarefas</h1>
      <button class="button hue-rotate" id="botaoAdd">Adicionar item +</button>
      <div class="item" id="apagarItem">
        <p>Novo item</p>
        <button id="lixeira">
          <svg
            width="24px"
            height="24px"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5.12817 8.15391C5.12817 10.4103 5.12817 13.5898 5.12817 15.1283C5.23074 16.4616 5.3333 18.2052 5.43587 19.436C5.53843 20.8719 6.7692 22.0001 8.2051 22.0001H15.7948C17.2307 22.0001 18.4615 20.8719 18.5641 19.436C18.6666 18.2052 18.7692 16.4616 18.8718 15.1283C18.9743 13.5898 18.8718 10.4103 18.8718 8.15391H5.12817Z"
              fill="#000000"
            />
            <path
              d="M19.1795 5.07698H16.6154L15.7949 3.53852C15.2821 2.61545 14.359 2.00006 13.3333 2.00006H10.8718C9.84615 2.00006 8.82051 2.61545 8.41026 3.53852L7.38462 5.07698H4.82051C4.41026 5.07698 4 5.48724 4 5.8975C4 6.30775 4.41026 6.71801 4.82051 6.71801H19.1795C19.5897 6.71801 20 6.41032 20 5.8975C20 5.38468 19.5897 5.07698 19.1795 5.07698ZM9.12821 5.07698L9.64103 4.25647C9.84615 3.84621 10.2564 3.53852 10.7692 3.53852H13.2308C13.7436 3.53852 14.1538 3.74365 14.359 4.25647L14.8718 5.07698H9.12821Z"
              fill="#000000"
            />
          </svg>
        </button>
      </div>
    </div>
    <script src="scripts/script.js"></script>
  </body>
</html>
