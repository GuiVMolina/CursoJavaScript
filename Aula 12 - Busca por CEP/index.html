<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 12 - Busca por CEP</title>
    <link rel="icon" type="image/png" href="../favicon/JS.png" />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <main>
      <h1>Buscar endereço pelo CEP</h1>
      <div class="form cep">
        <input type="text" id="cep" placeholder=" " />
        <label for="cep">CEP:</label>
        <button id="botao-buscar">Buscar</button>
      </div>
      <form class="formulario" action="">
        <div class="form">
          <input type="text" id="rua" placeholder=" " />
          <label for="rua">Rua:</label>
        </div>
        <div class="form">
          <input type="text" id="bairro" placeholder=" " />
          <label for="bairro">Bairro:</label>
        </div>
        <div class="form">
          <input type="text" id="cidade" placeholder=" " />
          <label for="cidade">Cidade:</label>
        </div>
        <div class="form">
          <input type="text" id="estado" placeholder=" " />
          <label for="estado">Estado:</label>
        </div>
      </form>
    </main>
    <script src="scripts/script.js"></script>
  </body>
</html>
